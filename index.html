<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Super Tosser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Racing+Sans+One&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="img/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="img/favicon/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- Left: coin and button -->
      <section class="stage">
        <div class="coin-wrap">
          <!-- Three.js canvas is inserted here by app.js -->
        </div>
        <div class="controls">
          <button id="toss-button" class="btn racing-sans-one-regular">Toss coin</button>
        </div>
        <footer class="site-footer">Created by Shaun Daubney for Picket Piece Social Club.</footer>
      </section>

      <!-- Right: scoreboard -->
      <aside class="scoreboard">
        <header class="brand">
  <img src="img/logo.png" alt="Game logo" class="logo" />
</header>

        <div class="current">
          <div class="label">Current result</div>
          <!-- Keep class 'result' so original opacity transition applies -->
          <p class="result racing-sans-one-regular gold"> </p>
        </div>

        <div class="history">
          <div class="label">Toss history</div>
          <div id="history-list" class="history-strip" aria-live="polite" aria-relevant="additions">
            <!-- Filled by JS -->
          </div>
        </div>
      </aside>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="app.js"></script>
    <button id="fs-toggle" class="fs-toggle" aria-label="Enter fullscreen" title="Enter fullscreen" type="button">
      <!-- inline SVG: two icons, we toggle visibility via data-state -->
      <svg class="icon enter" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M3 9V3h6v2H5v4H3zm16-4h-4V3h6v6h-2V5zM9 21H3v-6h2v4h4v2zm12-6v6h-6v-2h4v-4h2z"/>
      </svg>
      <svg class="icon exit" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M7 7H5v4H3V5h6v2H7zm12 0V5h-6v2h4v4h2V7zM7 17h2v2H3v-6h2v4h2zm12-4h2v6h-6v-2h4v-4z"/>
      </svg>
    </button>
</body>
</html>
